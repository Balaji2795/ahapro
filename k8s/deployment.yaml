apiVersion: apps/v1
kind: Deployment
metadata:
  name: aha-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aha-app
  template:
    metadata:
      labels:
        app: aha-app
    spec:
      containers:
      - name: aha-container
        image: balaji2795/aha-app:latest
        ports:
        - containerPort: 80
