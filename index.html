<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aha Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ff4d4d;
            color: white;
            padding: 15px;
        }
        main {
            margin: 40px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff4d4d;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Aha</h1>
</header>

<main>
    <p>This is a simple HTML page.</p>
    <button onclick="showMessage()">Click Me</button>
</main>

<script>
    function showMessage() {
        alert("Hello from Aha!");
    }
</script>

</body>
</html>
